# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[advisories]
ignore = [
    "RUSTSEC-2025-0111", # tokio-tar: dev-only transitive dep via testcontainers, no fix available
    "RUSTSEC-2024-0436", # paste: unmaintained, transitive dep
    "RUSTSEC-2025-0134", # rustls-pemfile: unmaintained, transitive dep
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "OpenSSL",
    "CC0-1.0",
    "GPL-3.0",
    "GPL-3.0-only",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
    "MPL-2.0",
    "Unlicense",
]
confidence-threshold = 0.8

[bans]
# warn not deny: 38 duplicate transitive deps from large dep tree (web framework + database + http)
multiple-versions = "warn"
wildcards = "deny"
# Workspace path deps use version = "*" implicitly
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
